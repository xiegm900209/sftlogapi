# sftlogapi - Docker Compose 配置
# 版本：v1.0.0

version: '3.8'

services:
  sftlogapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: sftlogapi:v1.0.0
    container_name: sftlogapi
    restart: unless-stopped
    
    # 端口映射
    ports:
      - "8090:80"
    
    # 环境变量
    environment:
      - TZ=Asia/Shanghai
    
    # 挂载日志目录（只读）
    volumes:
      # 挂载日志目录 - 修改为你的实际日志路径
      - /root/sft/testlogs:/app/logs:ro
      # 挂载配置文件（可选，用于自定义配置）
      - ./config:/app/config
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # 健康检查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # 网络配置
    networks:
      - sftlogapi-network

# 网络配置
networks:
  sftlogapi-network:
    driver: bridge
